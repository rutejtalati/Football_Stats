<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ── -->
    <title>StatinSite · Live Football Analytics</title>
    <meta name="description" content="Premium football analytics — live scores, AI predictions, FPL tools, standings, fixtures and match intelligence for Premier League, La Liga, Serie A and more." />
    <meta name="keywords" content="football analytics, live scores, FPL tools, fantasy premier league, football predictions, premier league standings, match predictions, football statistics" />
    <meta name="author" content="StatinSite" />
    <link rel="canonical" href="https://www.statinsite.com/" />

    <!-- ── Open Graph (Facebook / WhatsApp / LinkedIn) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="StatinSite" />
    <meta property="og:url"         content="https://www.statinsite.com/" />
    <meta property="og:title"       content="StatinSite · Live Football Analytics" />
    <meta property="og:description" content="Premium football analytics — live scores, AI predictions, FPL tools, standings, fixtures and match intelligence." />
    <meta property="og:image"       content="https://www.statinsite.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_GB" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@statinsite" />
    <meta name="twitter:title"       content="StatinSite · Live Football Analytics" />
    <meta name="twitter:description" content="Premium football analytics — live scores, AI predictions, FPL tools and match intelligence." />
    <meta name="twitter:image"       content="https://www.statinsite.com/og-image.png" />

    <!-- ── Favicon ── -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon"             type="image/png"     href="/favicon.png" />
    <link rel="apple-touch-icon"                      href="/apple-touch-icon.png" />

    <!-- ── Theme ── -->
    <meta name="theme-color" content="#080808" />

    <!-- ── Structured Data (WebSite + SearchAction) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "StatinSite",
      "url": "https://www.statinsite.com/",
      "description": "Premium football analytics — live scores, AI predictions, FPL tools, standings, fixtures and match intelligence.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.statinsite.com/players?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
